<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            margin: 0;
            padding: 30px;
            background: #f4f6f9;
        }

        h1 {
            color: #2a5298;
            margin-bottom: 5px;
        }

        h3 {
            color: #555;
            margin-bottom: 25px;
        }

        /* Action buttons section */
        a button {
            padding: 10px 15px;
            margin-right: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 6px;
            background: #2a5298;
            color: #fff;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.3s;
        }

        a button:hover {
            background: #1e3c72;
        }

        /* Student list cards */
        hr {
            border: none;
            border-top: 1px solid #ddd;
            margin: 20px 0;
        }

        .student-card {
            background: #fff;
            padding: 15px 20px;
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
            margin-bottom: 20px;
        }

        .student-card p {
            margin: 5px 0;
            color: #333;
            font-size: 14px;
        }

        .student-actions {
            margin-top: 10px;
        }

        .student-actions a button {
            background: #6c757d;
            font-size: 13px;
            padding: 7px 12px;
        }

        .student-actions a button:hover {
            background: #495057;
        }

        .student-actions a:last-child button {
            background: #dc3545;
        }

        .student-actions a:last-child button:hover {
            background: #b02a37;
        }

        /* Responsive */
        @media (max-width: 600px) {
            body {
                padding: 15px;
            }

            a button {
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>
<body>

    <h1>Hello {{name}}</h1>
    <h3>Select any one option from the below</h3>

    <a href="{% url 'create_course' %}"><button>Register a Course</button></a>
    <a href="{% url 'create_student' %}"><button>Create a Student</button></a>
    <a href="{% url 'add_course_student' %}"><button>Associate a Student and Course</button></a>

    <br><br>

    {% for student in students %}
        <div class="student-card">
            <p><strong>Username:</strong> {{student.username}}</p>
            <p><strong>Address:</strong> {{student.address}}</p>
            <p><strong>Phone:</strong> {{student.phone_number}}</p>

            <div class="student-actions">
                <a href="{% url 'update_student' student.id %}">
                    <button>Edit</button>
                </a>
                <a href="{% url 'delete_student' student.id %}">
                    <button>Delete</button>
                </a>
            </div>
        </div>
    {% endfor %}

</body>
</html>
